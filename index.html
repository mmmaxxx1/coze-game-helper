<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Помощник по прокачке Diablo 2</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), 
                  url('https://images.unsplash.com/photo-1611996575749-79a3a250f948?q=80&w=1920') center/cover no-repeat;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 12px 10px;
      background: rgba(20, 5, 5, 0.95);
      border-bottom: 3px solid #b38b2d;
    }

    .header h1 {
      margin: 0;
      font-size: 1.65rem;
      color: #ffcc00;
      text-shadow: 0 0 10px #b38b2d;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>⚔️ Помощник по прокачке</h1>
  </div>

  <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.10/libs/oversea/index.js"></script>

  <script>
    new CozeWebSDK.WebChatClient({
      config: {
        type: 'bot',
        bot_id: '7634821684104921141',
        isIframe: false,
      },
      auth: {
        type: 'token',
        token: 'paste_your_token_here',           // ← ВСТАВЬ ТОКЕН
        onRefreshToken: async () => 'paste_your_token_here'
      },
      userInfo: {
        id: 'player',
        nickname: 'Игрок',
      },
      ui: {
        base: {
          layout: 'mobile',   // ← Важно для телефона
          lang: 'ru',
          zIndex: 10000
        },
        header: { isShow: true, isNeedClose: true },
        asstBtn: { isNeed: true },
        chatBot: {
          title: 'Помощник Diablo 2',
          uploadable: true,
          width: 400,         // будет адаптироваться
        }
      }
    });
  </script>
</body>
</html>
